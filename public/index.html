<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
</head>
<body class="container">
    <h1 class="mt-5">mini chat</h1>
    <hr>

    <form id="miformulario">
    <div class="row">
        <div class="col-8">
            <input type="text" class="form-control" placeholder="mensaje" id="txtMensaje">

        </div>

        <div class="col-4">
            <button type="submit" class="btn btn-primary">Enviar</button>
        </div>
    </div>
    </form>

    <div class="row">
        <div class="col" >
            <ul id="misMensajes" class="mt-2"></ul>
            
        
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.8.1/socket.io.js"></script>

    <script>
     const socket = io('https://react-socket-vnhc.onrender.com/');

     //referencias a elementos del dom
    const formulario = document.querySelector('#miformulario');
    const mensajes = document.querySelector('#misMensajes');
    const txtMensaje = document.querySelector('#txtMensaje');


    formulario.addEventListener('submit', (e) => {
        e.preventDefault();

        const nuevoMensaje = txtMensaje.value;
        socket.emit('mensaje-to-server', { texto: nuevoMensaje });
    });

    socket.on('mensaje-from-server', (data) => {
        mensajes.innerHTML += `<li>${data.texto}</li>`;
    });

        //socket.on('mensaje-bienvenida', (data) => {
        //    console.log(data);
        //});

        //setTimeout(() => {
         //  socket.emit('mensaje-cliente', { msg: 'cliente', nombre: 'juan' });
        //}, 2000);


    </script>
</body>
</html>
